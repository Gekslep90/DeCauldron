<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DaCauldron — Alchemist Transmutation Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cauldron-bg: #0d0f0a;
      --cauldron-surface: #161a12;
      --cauldron-card: #1e2319;
      --cauldron-border: #2d3526;
      --cauldron-text: #e8ead8;
      --cauldron-muted: #6b7359;
      --cauldron-amber: #d4a84b;
      --cauldron-glow: #8fbc3a;
      --cauldron-elixir: #5a9a6e;
      --cauldron-danger: #c45c4a;
      --cauldron-radius: 8px;
      --cauldron-font: "Cinzel", serif;
      --cauldron-mono: "IBM Plex Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--cauldron-font);
      background: var(--cauldron-bg);
      color: var(--cauldron-text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 45% at 50% -10%, rgba(212, 168, 75, 0.08), transparent),
        radial-gradient(ellipse 50% 35% at 100% 80%, rgba(143, 188, 58, 0.06), transparent),
        radial-gradient(ellipse 40% 30% at 0% 70%, rgba(90, 154, 110, 0.05), transparent);
    }
    .dc-wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.5rem;
      min-height: 100vh;
    }
    header.dc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--cauldron-border);
      margin-bottom: 1.5rem;
    }
    .dc-logo {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--cauldron-amber);
      letter-spacing: 0.06em;
    }
    .dc-tagline {
      font-size: 0.7rem;
      color: var(--cauldron-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }
    .dc-wallet-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .dc-wallet-addr {
      font-family: var(--cauldron-mono);
      font-size: 0.78rem;
      color: var(--cauldron-muted);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dc-btn {
      font-family: var(--cauldron-font);
      font-size: 0.8rem;
      padding: 0.5rem 1rem;
      border-radius: var(--cauldron-radius);
      border: 1px solid var(--cauldron-border);
      background: var(--cauldron-card);
      color: var(--cauldron-text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .dc-btn:hover {
      background: var(--cauldron-border);
      border-color: var(--cauldron-amber);
    }
    .dc-btn-primary {
      background: linear-gradient(135deg, var(--cauldron-amber) 0%, #b8923d 100%);
      border-color: var(--cauldron-amber);
      color: var(--cauldron-bg);
    }
    .dc-btn-primary:hover {
      filter: brightness(1.1);
    }
    .dc-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .dc-tab {
      padding: 0.5rem 1rem;
      border-radius: var(--cauldron-radius);
      border: 1px solid var(--cauldron-border);
      background: transparent;
      color: var(--cauldron-muted);
      cursor: pointer;
      font-family: var(--cauldron-font);
      font-size: 0.85rem;
    }
    .dc-tab:hover { color: var(--cauldron-text); border-color: var(--cauldron-amber); }
    .dc-tab.active {
      background: var(--cauldron-card);
      color: var(--cauldron-amber);
      border-color: var(--cauldron-amber);
    }
    .dc-panel {
      display: none;
      padding: 1.25rem;
      border: 1px solid var(--cauldron-border);
      border-radius: var(--cauldron-radius);
      background: var(--cauldron-surface);
    }
    .dc-panel.active { display: block; }
    .dc-card {
      background: var(--cauldron-card);
      border: 1px solid var(--cauldron-border);
      border-radius: var(--cauldron-radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .dc-card h3 {
      font-size: 0.95rem;
      color: var(--cauldron-amber);
      margin-bottom: 0.75rem;
      letter-spacing: 0.04em;
    }
    .dc-label {
      font-size: 0.72rem;
      color: var(--cauldron-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }
    .dc-input {
      width: 100%;
      font-family: var(--cauldron-mono);
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--cauldron-border);
      border-radius: var(--cauldron-radius);
      background: var(--cauldron-bg);
      color: var(--cauldron-text);
      margin-bottom: 0.75rem;
    }
    .dc-input:focus {
      outline: none;
      border-color: var(--cauldron-amber);
    }
    .dc-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .dc-grid-2 { grid-template-columns: 1fr; } }
    .dc-list {
      list-style: none;
    }
    .dc-list li {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--cauldron-border);
      font-family: var(--cauldron-mono);
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dc-list li:last-child { border-bottom: none; }
    .dc-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      background: var(--cauldron-border);
      color: var(--cauldron-muted);
    }
    .dc-badge.active { background: rgba(143, 188, 58, 0.2); color: var(--cauldron-glow); }
    .dc-badge.paused { background: rgba(196, 92, 74, 0.2); color: var(--cauldron-danger); }
    .dc-msg {
      padding: 0.75rem;
      border-radius: var(--cauldron-radius);
      font-size: 0.85rem;
      margin-top: 0.75rem;
    }
    .dc-msg.info { background: rgba(90, 154, 110, 0.15); border: 1px solid var(--cauldron-elixir); color: var(--cauldron-elixir); }
    .dc-msg.err { background: rgba(196, 92, 74, 0.15); border: 1px solid var(--cauldron-danger); color: var(--cauldron-danger); }
    .dc-msg.warn { background: rgba(212, 168, 75, 0.15); border: 1px solid var(--cauldron-amber); color: var(--cauldron-amber); }
    .dc-footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--cauldron-border);
      font-size: 0.75rem;
      color: var(--cauldron-muted);
      text-align: center;
    }
    .dc-footer a { color: var(--cauldron-amber); text-decoration: none; }
    .dc-hero {
      text-align: center;
      padding: 1.5rem 0;
      margin-bottom: 1.5rem;
    }
    .dc-hero h1 {
      font-size: 1.5rem;
      color: var(--cauldron-text);
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .dc-hero p {
      font-size: 0.9rem;
      color: var(--cauldron-muted);
      margin-top: 0.5rem;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .dc-stat {
      text-align: center;
      padding: 0.75rem;
    }
    .dc-stat-value {
      font-family: var(--cauldron-mono);
      font-size: 1.25rem;
      color: var(--cauldron-amber);
    }
    .dc-stat-label {
      font-size: 0.7rem;
      color: var(--cauldron-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
    }
    .dc-cauldron-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 0.75rem;
      background: radial-gradient(circle, var(--cauldron-amber) 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.6;
    }
    .dc-table-wrap { overflow-x: auto; margin: 0.75rem 0; }
    .dc-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--cauldron-mono);
      font-size: 0.78rem;
    }
    .dc-table th, .dc-table td {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--cauldron-border);
    }
    .dc-table th {
      color: var(--cauldron-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .dc-table tr:hover td { background: rgba(45, 53, 38, 0.4); }
    .dc-tooltip {
      position: relative;
    }
    .dc-tooltip:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.35rem 0.6rem;
      background: var(--cauldron-card);
      border: 1px solid var(--cauldron-border);
      border-radius: 4px;
      font-size: 0.7rem;
      white-space: nowrap;
      z-index: 10;
      margin-bottom: 0.35rem;
    }
    .dc-anim-fade { animation: dcFade 0.3s ease; }
    @keyframes dcFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .dc-calc-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .dc-calc-row .dc-input { margin-bottom: 0; flex: 1; min-width: 120px; }
    .dc-calc-result {
      font-family: var(--cauldron-mono);
      font-size: 1rem;
      color: var(--cauldron-glow);
      padding: 0.75rem;
      background: var(--cauldron-bg);
      border-radius: var(--cauldron-radius);
      margin-top: 0.5rem;
    }
    .dc-constants-list {
      list-style: none;
    }
    .dc-constants-list li {
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--cauldron-border);
      font-family: var(--cauldron-mono);
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }
    .dc-event-log {
      max-height: 280px;
      overflow-y: auto;
      font-family: var(--cauldron-mono);
      font-size: 0.72rem;
      padding: 0.5rem;
      background: var(--cauldron-bg);
      border-radius: var(--cauldron-radius);
      border: 1px solid var(--cauldron-border);
    }
    .dc-event-log .evt-entry {
      display: block;
      padding: 0.35rem 0;
      border-bottom: 1px solid rgba(45, 53, 38, 0.6);
      color: var(--cauldron-muted);
    }
    .dc-event-log .evt-entry:last-child { border-bottom: none; }
    .dc-event-log .evt-name { color: var(--cauldron-amber); }
    .dc-event-log .evt-data { color: var(--cauldron-elixir); word-break: break-all; }
    .dc-settings-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .dc-settings-row .dc-input { margin-bottom: 0; flex: 1; }
    .dc-chain-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      background: var(--cauldron-border);
      border-radius: 4px;
      font-family: var(--cauldron-mono);
      font-size: 0.75rem;
      color: var(--cauldron-muted);
    }
    .dc-help-text {
      font-size: 0.75rem;
      color: var(--cauldron-muted);
      margin-top: 0.25rem;
      line-height: 1.4;
    }
    @media (max-width: 480px) {
      .dc-wrap { padding: 1rem; }
      .dc-logo { font-size: 1.35rem; }
      .dc-tab { padding: 0.4rem 0.75rem; font-size: 0.78rem; }
    }
    @media print {
      .dc-btn, .dc-tabs, .dc-wallet-row button { display: none !important; }
      .dc-panel { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="dc-wrap">
    <header class="dc-header">
      <div>
        <div class="dc-logo">DaCauldron</div>
        <div class="dc-tagline">Alchemist Transmutation Lab</div>
